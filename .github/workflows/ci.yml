name: CI/CD

on:
  push:
    branches: [master]
  pull_request:
    branches: [master]

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository }}/api

jobs:
  # ── Go unit tests (fast, no DB) ──────────────────────────────────────────
  test-go-unit:
    name: Go Unit Tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version: "1.22"
          cache-dependency-path: server/go.sum

      - name: Run unit tests
        working-directory: server
        run: |
          go test \
            ./internal/auth/... \
            ./internal/email/... \
            ./internal/middleware/... \
            ./internal/sync/... \
            ./internal/workspace/... \
            -count=1 -timeout=120s

  # ── Go integration tests (requires PostgreSQL) ───────────────────────────
  test-go-integration:
    name: Go Integration Tests
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_DB: rimi_test
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 5s
          --health-timeout 3s
          --health-retries 10

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version: "1.22"
          cache-dependency-path: server/go.sum

      - name: Run integration tests
        working-directory: server
        env:
          # Testcontainers: disable Ryuk when a real PG service is available.
          TESTCONTAINERS_RYUK_DISABLED: "true"
        run: |
          go test ./internal/integration/... \
            -count=1 -timeout=300s

  # ── Flutter tests ─────────────────────────────────────────────────────────
  test-flutter:
    name: Flutter Tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: subosito/flutter-action@v2
        with:
          flutter-version: "3.x"
          channel: stable
          cache: true

      - name: Get dependencies
        working-directory: flutter
        run: flutter pub get

      - name: Run tests
        working-directory: flutter
        run: flutter test --no-pub

  # ── Build & push Docker image to GHCR ────────────────────────────────────
  build-push:
    name: Build & Push Docker Image
    needs: [test-go-unit, test-go-integration, test-flutter]
    runs-on: ubuntu-latest
    # Only push on direct pushes to master; skip on PRs.
    if: github.ref == 'refs/heads/master' && github.event_name == 'push'
    permissions:
      contents: read
      packages: write

    steps:
      - uses: actions/checkout@v4

      - uses: docker/setup-buildx-action@v3

      - uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract metadata (tags, labels)
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}
          tags: |
            type=sha,prefix=sha-
            type=raw,value=latest,enable={{is_default_branch}}

      - name: Build and push
        uses: docker/build-push-action@v5
        with:
          context: ./server
          file: ./server/Dockerfile
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          # Layer caching via GitHub Actions cache — speeds up rebuilds.
          cache-from: type=gha
          cache-to: type=gha,mode=max

  # ── Deploy to DigitalOcean App Platform ──────────────────────────────────
  deploy:
    name: Deploy to DigitalOcean
    needs: build-push
    runs-on: ubuntu-latest
    if: github.ref == 'refs/heads/master' && github.event_name == 'push'

    steps:
      - uses: actions/checkout@v4

      - name: Install doctl
        uses: digitalocean/action-doctl@v2
        with:
          token: ${{ secrets.DIGITALOCEAN_ACCESS_TOKEN }}

      - name: Deploy (create or update)
        run: |
          # If the app already exists, update it; otherwise create it.
          APP_ID=$(doctl apps list --format ID --no-header 2>/dev/null | head -1)
          if [ -n "$APP_ID" ]; then
            doctl apps update "$APP_ID" --spec .do/app.yaml --no-wait
          else
            doctl apps create --spec .do/app.yaml --no-wait
          fi
