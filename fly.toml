# fly.toml — RiMi API server on Fly.io
# Deploy: fly deploy (from repo root)
# Secrets: fly secrets set DB_MIGRATOR_URL=... DB_APP_URL=... JWT_PRIVATE_KEY_PEM=... JWT_PUBLIC_KEY_PEM=...

app = "rimi-api"
primary_region = "sin"   # Singapore — closest to Vietnam

[build]
  dockerfile = "Dockerfile"

[env]
  PORT = "8080"
  JWT_ISSUER = "rimi-auth"
  JWT_AUDIENCE = "rimi-api"
  JWT_KEY_ID = "k1"
  JWT_ACCESS_TTL = "15m"
  REFRESH_TOKEN_TTL = "720h"
  SMTP_HOST = "localhost"
  SMTP_PORT = "1025"
  SMTP_FROM = "noreply@rimi.app"
  LOCKOUT_THRESHOLD = "5"
  LOCKOUT_DURATION = "15m"
  EMAIL_VERIFY_TTL = "24h"
  PASSWORD_RESET_TTL = "30m"
  MIGRATIONS_PATH = "file://migrations"

[http_service]
  internal_port = 8080
  force_https = true
  auto_stop_machines = "stop"
  auto_start_machines = true
  min_machines_running = 0
  processes = ["app"]

  [[http_service.checks]]
    grace_period = "30s"
    interval = "15s"
    method = "GET"
    path = "/v1/health"
    timeout = "5s"

[[vm]]
  size = "shared-cpu-1x"
  memory = "256mb"
