version: "3.9"

# SECRETS-01/TENANCY-03: credentials come from .env (not committed).
# Copy .env.example to .env and fill in real values.
# Two DB roles per ADR-002:
#   rimi_migrator — owns tables, runs migrations
#   rimi_app      — restricted (NOBYPASSRLS, non-owner), used by the API

services:
  postgres:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_DB: rimi
      POSTGRES_USER: rimi_migrator
      POSTGRES_PASSWORD: ${DB_MIGRATOR_PASSWORD}
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
      - ./docker/postgres-init.sql:/docker-entrypoint-initdb.d/01_init.sql:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U rimi_migrator -d rimi"]
      interval: 5s
      timeout: 5s
      retries: 5

  mailpit:
    image: axllent/mailpit:latest
    restart: unless-stopped
    ports:
      - "1025:1025"   # SMTP
      - "8025:8025"   # Web UI for local email dev

  api:
    build:
      context: .
      dockerfile: Dockerfile
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
      mailpit:
        condition: service_started
    environment:
      PORT: "8080"
      DB_MIGRATOR_URL: "postgres://rimi_migrator:${DB_MIGRATOR_PASSWORD}@postgres:5432/rimi?sslmode=disable"
      DB_APP_URL: "postgres://rimi_app:${DB_APP_PASSWORD}@postgres:5432/rimi?sslmode=disable"
      JWT_PRIVATE_KEY_PEM: ${JWT_PRIVATE_KEY_PEM}
      JWT_PUBLIC_KEY_PEM: ${JWT_PUBLIC_KEY_PEM}
      JWT_ISSUER: "rimi-auth"
      JWT_AUDIENCE: "rimi-api"
      JWT_KEY_ID: "k1"
      SMTP_HOST: "mailpit"
      SMTP_PORT: "1025"
      SMTP_FROM: "noreply@rimi.app"
      MIGRATIONS_PATH: "file:///app/migrations"
    ports:
      - "8080:8080"
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:8080/v1/health || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 3

volumes:
  pgdata:
